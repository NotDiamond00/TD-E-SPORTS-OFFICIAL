    <style>
        body {
            background-color: #050507;
            background-image: 
                radial-gradient(circle at 15% 50%, rgba(176, 38, 255, 0.08) 0%, transparent 25%),
                radial-gradient(circle at 85% 30%, rgba(0, 243, 255, 0.08) 0%, transparent 25%);
            color: #e2e8f0;
            min-height: 100vh;
        }

        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #050507; }
        ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
        ::-webkit-scrollbar-thumb:hover { background: #b026ff; }

        .glass {
            background: rgba(15, 15, 22, 0.6);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .neon-box {
            box-shadow: 0 0 15px rgba(176, 38, 255, 0.1);
            transition: all 0.3s ease;
        }
        .neon-box:hover {
            box-shadow: 0 0 25px rgba(176, 38, 255, 0.3), inset 0 0 10px rgba(176, 38, 255, 0.1);
            border-color: rgba(176, 38, 255, 0.5);
            transform: translateY(-2px);
        }

        .btn-primary {
            background: linear-gradient(90deg, #b026ff, #ff007f);
            box-shadow: 0 0 15px rgba(176, 38, 255, 0.4);
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            box-shadow: 0 0 25px rgba(176, 38, 255, 0.7);
            transform: scale(1.02);
        }

        .text-glow {
            text-shadow: 0 0 10px rgba(176, 38, 255, 0.5);
        }

        .fade-in { animation: fadeIn 0.5s ease-out forwards; }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .field-toggle {
            transition: all 0.3s ease;
            overflow: hidden;
        }
        .field-hidden {
            max-height: 0;
            opacity: 0;
            padding: 0;
            margin: 0;
        }
        .field-visible {
            max-height: 100px;
            opacity: 1;
            padding: 0;
            margin: 0;
        }

        #mobile-menu {
            transition: all 0.3s ease;
        }
        #mobile-menu.hidden {
            display: none;
        }
        #mobile-menu:not(.hidden) {
            display: block;
            animation: slideDown 0.3s ease-out;
        }
        @keyframes slideDown {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .input-error {
            border-color: #ef4444 !important;
            box-shadow: 0 0 0 3px rgba(239, 68, 68, 0.1) !important;
            animation: shake 0.3s ease-in-out;
        }
        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }
    </style>

            updateNavForAdmin: function() {
                const adminBtnText = document.getElementById('adminBtnText');

                const logoutBtn = document.getElementById('logoutBtn');
                const mobileLogoutBtn = document.getElementById('mobileLogoutBtn');
                
                if (this.data.isAdmin) {
                    if (adminBtnText) adminBtnText.textContent = 'Dashboard';

                    if (logoutBtn) logoutBtn.classList.remove('hidden');
                    if (mobileLogoutBtn) mobileLogoutBtn.classList.remove('hidden');
                } else {
                    if (adminBtnText) adminBtnText.textContent = 'Admin';
                    if (mobileAdminBtnText) mobileAdminBtnText.textContent = 'Admin Login';
                    if (logoutBtn) logoutBtn.classList.add('hidden');
                    if (mobileLogoutBtn) mobileLogoutBtn.classList.add('hidden');
                }
            },

            toggleMobileMenu: function() {
                const menu = document.getElementById('mobile-menu');
                const btn = document.getElementById('mobileMenuBtn');
                
                if (!menu || !btn) return;
                
                if (menu.classList.contains('hidden')) {
                    menu.classList.remove('hidden');
                    btn.innerHTML = '<i class="fa-solid fa-xmark text-2xl"></i>';
                } else {
                    menu.classList.add('hidden');
                    btn.innerHTML = '<i class="fa-solid fa-bars text-2xl"></i>';
                }
            },

            router: function(route, params = null) {
                this.loadData();
                const root = document.getElementById('app-root');
                root.innerHTML = '';
                window.scrollTo(0, 0);
                
                const menu = document.getElementById('mobile-menu');
                const btn = document.getElementById('mobileMenuBtn');
                if(menu && !menu.classList.contains('hidden')) {
                    menu.classList.add('hidden');
                    if(btn) btn.innerHTML = '<i class="fa-solid fa-bars text-2xl"></i>';
                }

                switch(route) {
                    case 'home': this.renderHome(root); break;
                    case 'details': this.renderDetails(root, params); break;
                    case 'register': this.renderRegister(root, params); break;
                    case 'admin-login': this.renderAdminLogin(root); break;
                    case 'admin-dashboard': this.renderAdminDashboard(root); break;
                    case 'admin-registrations': this.renderAdminRegistrations(root, params); break;
                    default: this.renderHome(root);
                }
            },

            formatTime12Hour: function(timeString) {
                if (!timeString) return '';
                const [hours, minutes] = timeString.split(':');
                const date = new Date();
                date.setHours(parseInt(hours));
                date.setMinutes(parseInt(minutes));
                return date.toLocaleTimeString('en-US', { 
                    hour: 'numeric', 
                    minute: '2-digit', 
                    hour12: true 
                });
            },

            formatDate: function(dateString) {
                if (!dateString) return 'N/A';
                const options = { day: 'numeric', month: 'short', year: 'numeric' };
                return new Date(dateString).toLocaleDateString('en-US', options);
            },

            renderHome: function(container) {

                        return true;

                } else {
                    content += `<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">`;
                    activeTournaments.forEach(t => {
                        const registeredCount = this.data.registrations.filter(r => r.tournamentId === t.id).length;
                        
                        let maxTeamsVal = parseInt(t.maxTeams);
                        if (isNaN(maxTeamsVal) || t.maxTeams === 'Unlimited') {
                            maxTeamsVal = Infinity;
                        }
                        const isFull = maxTeamsVal !== Infinity && registeredCount >= maxTeamsVal;
                        
                        const startTimeFormatted = this.formatTime12Hour(t.startTime);
                        
                        content += `
                            <div class="glass rounded-xl overflow-hidden neon-box flex flex-col h-full fade-in">
                                <div class="h-48 relative bg-gray-900 overflow-hidden group">
                                    <img src="https://wallpapers.com/images/hd/free-fire-battlegrounds-4k-gaming-wallpaper-z7y5w5x5w5x5w5x5.jpg" class="w-full h-full object-cover opacity-40 group-hover:opacity-60 transition-opacity duration-500" alt="Free Fire">

                                    <div class="space-y-4 mb-8">

                function update() {
                    if(counterEl) counterEl.innerText = current + " / " + (maxSlots === Infinity ? '∞' : maxSlots);
                    if(registerBtn && maxSlots !== Infinity && current >= maxSlots) {
                        registerBtn.disabled = true;
                        registerBtn.innerText = "Slots Full";
                        registerBtn.classList.add('opacity-50', 'cursor-not-allowed');
                    }
                }
                const form = document.getElementById("registrationForm");
                if(form) {
                    form.addEventListener("submit", function(e) {
                        if(maxSlots !== Infinity && current >= maxSlots) { e.preventDefault(); alert("Slots Full"); return; }
                    }, { once: true });
                }
                update();
            },

            handleRegistration: function(e, tournamentId) {
                e.preventDefault();
                this.loadData();
                const form = e.target;
                const tournament = this.data.tournaments.find(t => t.id === tournamentId);
                
                const playerName = form.playerName.value.trim();
                const teamName = tournament.matchType === 'Solo' ? 'Solo Player' : form.teamName.value.trim();
                const uid = form.uid.value.trim();
                const phone = form.phone.value.trim().replace(/\D/g, '');
                
                const existingPhone = this.data.registrations.find(r => 
                    r.tournamentId === tournamentId && 
                    r.phone.replace(/\D/g, '') === phone
                );
                
                if (existingPhone) {
                    form.phone.classList.add('input-error');
                    setTimeout(() => form.phone.classList.remove('input-error'), 300);
                    alert('❌ This phone number is already registered for this tournament!');
                    form.phone.focus();
                    return;
                }
                
                const existingUID = this.data.registrations.find(r => 
                    r.tournamentId === tournamentId && 
                    r.uid === uid
                );
                
                if (existingUID) {
                    form.uid.classList.add('input-error');
                    setTimeout(() => form.uid.classList.remove('input-error'), 300);
                    alert('❌ This Free Fire UID is already registered for this tournament!');
                    form.uid.focus();
                    return;
                }
                
                let maxTeamsVal = parseInt(tournament.maxTeams);
                if (isNaN(maxTeamsVal) || tournament.maxTeams === 'Unlimited') {
                    maxTeamsVal = Infinity;
                }
                const registeredCount = this.data.registrations.filter(r => r.tournamentId === tournamentId).length;
                
                if (maxTeamsVal !== Infinity && registeredCount >= maxTeamsVal) {
                    alert('Sorry, this tournament is now full!');
                    this.router('details', tournamentId);
                    return;
                }
                
                const newRegistration = {
                    id: Date.now(),
                    tournamentId: tournamentId,
                    playerName: playerName,
                    teamName: teamName,
                    uid: uid,
                    phone: phone,
                    timestamp: new Date().toISOString()
                };
                
                this.data.registrations.push(newRegistration);
                localStorage.setItem('td_registrations', JSON.stringify(this.data.registrations));
                
                // ✅ Send to Discord
                this.sendRegistrationToDiscord(tournament, newRegistration);
                
                // Send Telegram notification (if configured)
                this.notifyAdmins(tournament, newRegistration);
                
                alert('✅ Registration Successful!');
                this.router('details', tournamentId);
            },

            notifyAdmins: async function(tournament, registration) {
                const bot = this.data.config.telegramBot;
                if (!bot || !bot.token || !bot.chatId) return;
                
                const message = `
🔥 *NEW REGISTRATION* 🔥

📋 *Tournament:* ${tournament.name}
👤 *Player:* ${registration.playerName}
🏆 *Team:* ${registration.teamName}
🎯 *UID:* ${registration.uid}
📱 *Phone:* +91 ${registration.phone}
                `.trim();
                
                try {
                    await fetch(`https://api.telegram.org/bot${bot.token}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: bot.chatId,
                            text: message,
                            parse_mode: 'Markdown'
                        })
                    });
                } catch (error) {
                    console.error('Telegram error:', error);
                }
            },

            // 🔔 Send tournament creation notification to Discord
            sendTournamentToDiscord: async function(tournament) {
                const webhook = this.data.config.discord.registrationChannel;
                if (!webhook || webhook === 'YOUR_REGISTRATION_WEBHOOK_URL_HERE') {
                    console.log('Discord webhook not configured');
                    return;
                }
                
                // 🔗 Get website URL from config
                const websiteUrl = this.data.config.websiteUrl || 'https://yourwebsite.com';
                const tournamentUrl = `${websiteUrl}/?tournament=${tournament.id}`;
                
                const embed = {
                    embeds: [{
                        title: '🏆 New Tournament Created!',
                        color: 0xB026FF, // Purple color
                        description: `**📋 Tournament Name:** ${tournament.name}\n\n🔗 **Register Now:** [Click Here to Register](${tournamentUrl})`,
                        fields: [
                            { name: '🎮 Match Type', value: tournament.matchType, inline: true },
                            { name: '💰 Prize Pool', value: tournament.prizePool, inline: true },
                            { name: '🎟️ Entry Fee', value: tournament.fee, inline: true },
                            { name: '👥 Max Teams', value: tournament.maxTeams, inline: true },
                            { name: '📅 Date', value: `${tournament.startDate} at ${tournament.startTime}`, inline: false }
                        ],
                        footer: { text: 'TD E-SPORTS' },
                        timestamp: new Date().toISOString(),
                        url: tournamentUrl // Makes the title clickable
                    }]
                };
                
                try {
                    await fetch(webhook, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(embed)
                    });
                    console.log('✅ Tournament posted to Discord');
                } catch (error) {
                    console.error('❌ Discord error:', error);
                }
            },

            // 🔔 Send registration notification to Discord
            sendRegistrationToDiscord: async function(tournament, registration) {
                const webhook = this.data.config.discord.registeredChannel;
                if (!webhook || webhook === 'YOUR_REGISTERED_WEBHOOK_URL_HERE') {
                    console.log('Discord webhook not configured');
                    return;
                }
                
                const embed = {
                    embeds: [{
                        title: '✅ New Registration!',
                        color: 0x00F3FF, // Cyan color
                        fields: [
                            { name: '📋 Tournament', value: tournament.name, inline: false },
                            { name: '👤 Player Name', value: registration.playerName, inline: true },
                            { name: '🏆 Team Name', value: registration.teamName, inline: true },
                            { name: '🎯 UID', value: registration.uid, inline: true },
                            { name: '📱 Contact', value: `+91 ${registration.phone}`, inline: true }
                        ],
                        footer: { text: 'TD E-SPORTS' },
                        timestamp: new Date().toISOString()
                    }]
                };
                
                try {
                    await fetch(webhook, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify(embed)
                    });
                    console.log('✅ Registration posted to Discord');
                } catch (error) {
                    console.error('❌ Discord error:', error);
                }
            },

            // 🔐 Simple Admin Login with Obfuscated Credentials
            handleAdminLogin: function(e) {
                e.preventDefault();
                
                const username = document.getElementById('adminUser').value;
                const password = document.getElementById('adminPass').value;
                const errorEl = document.getElementById('loginError');
                
                // Get stored credentials (decoded from Base64)
                const storedUser = this._auth._getU();
                const storedPass = this._auth._getP();
                
                // Check credentials
                if (username !== storedUser || password !== storedPass) {
                    errorEl.classList.remove('hidden');
                    errorEl.classList.add('fade-in');
                    document.getElementById('adminPass').value = '';
                    return;
                }
                
                // Login successful - create session
                const sessionData = {
                    verified: true,
                    timestamp: Date.now(),
                    username: username
                };
                
                localStorage.setItem('td_admin_session', btoa(JSON.stringify(sessionData)));
                this.data.isAdmin = true;
                
                // Update navigation
                this.updateNavForAdmin();
                
                // Optional: Send login notification to Telegram
                this.sendLoginNotification(username);
                
                this.router('admin-dashboard');
            },

            // Send login notification to Telegram (optional)
            sendLoginNotification: async function(username) {
                const bot = this.data.config.telegramBot;
                if (!bot || !bot.token || !bot.chatId) return;
                
                const message = `🔐 *Admin Login*\n\n👤 User: ${username}\n⏰ Time: ${new Date().toLocaleString()}\n\n✅ Login Successful`;
                
                try {
                    await fetch(`https://api.telegram.org/bot${bot.token}/sendMessage`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            chat_id: bot.chatId,
                            text: message,
                            parse_mode: 'Markdown'
                        })
                    });
                } catch (error) {
                    console.error('Telegram error:', error);
                }
            },

            logout: function() {
                this.data.isAdmin = false;
                localStorage.removeItem('td_admin_session');
                this.updateNavForAdmin();
                this.router('home');
            },

            createTournament: function(e) {
                e.preventDefault();
                this.loadData();
                
                const form = e.target;
                
                let maxTeamsValue = form.tMax.value.trim();
                if (maxTeamsValue === '' || isNaN(parseInt(maxTeamsValue))) {
                    maxTeamsValue = 'Unlimited';
                }

                const newTournament = {
                    id: Date.now(),
                    name: form.tName.value,
                    matchType: form.tType.value,
                    maxTeams: maxTeamsValue,
                    fee: form.tFee.value,
                    prizePool: form.tPrize.value,
                    startDate: form.tStartD.value,
                    startTime: form.tStartT.value,
                    endDate: form.tEndD.value,
                    endTime: form.tEndT.value
                };
                
                this.data.tournaments.push(newTournament);
                localStorage.setItem('td_tournaments', JSON.stringify(this.data.tournaments));
                
                // ✅ Send to Discord
                this.sendTournamentToDiscord(newTournament);
                
                alert('✅ Tournament Created Successfully!');
                
                this.renderAdminDashboard(document.getElementById('app-root'));
                form.reset();
                document.querySelector('input[name="tStartT"]').value = '12:00';
                document.querySelector('input[name="tEndT"]').value = '14:00';
            },

            deleteTournament: function(index) {
                if(confirm('Are you sure you want to delete this tournament?')) {
                    this.loadData();
                    const deletedTournament = this.data.tournaments[index];
                    this.data.registrations = this.data.registrations.filter(r => r.tournamentId !== deletedTournament.id);
                    localStorage.setItem('td_registrations', JSON.stringify(this.data.registrations));
                    this.data.tournaments.splice(index, 1);
                    localStorage.setItem('td_tournaments', JSON.stringify(this.data.tournaments));
                    this.renderAdminDashboard(document.getElementById('app-root'));
                }
            }
        };

        document.addEventListener('DOMContentLoaded', () => {
            app.init();
        });
    </script>
</body>
</html>
